<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settle — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --surface-2: #F6F7F9;
      --ink: #0B0F14;
      --ink-2: #3E4753;
      --ink-3: #8A94A1;
      --line: #E6E9EE;
      --line-2: #F0F2F5;
      --chip: #F2F4F7;
      --accent: #2563EB;
      --accent-soft: #EEF3FF;
      --accent-deep: #1E4FD4;
      --warn: #DC2626;
      --warn-soft: #FEF2F2;
      --pos: #059669;
      --pos-soft: #ECFDF5;
      --elev: 0 1px 0 rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.05);
      --elev-2: 0 2px 4px rgba(16, 24, 40, 0.06), 0 8px 20px rgba(16, 24, 40, 0.05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; font-family: 'Inter Tight', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .device-fit {
      transform: scale(var(--device-scale, 1));
      transform-origin: center center;
      flex-shrink: 0;
    }
    /* Hide every scrollbar inside the preview — keeps the phone screen looking clean. */
    .screen-scroll, *[style*="overflow"] { scrollbar-width: none; -ms-overflow-style: none; }
    .screen-scroll::-webkit-scrollbar,
    *[style*="overflow"]::-webkit-scrollbar,
    *::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    .placeholder-img {
      background: repeating-linear-gradient(135deg, #E8EAEE 0 6px, #F2F4F7 6px 12px);
      color: var(--ink-3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }
  </style>
</head>
